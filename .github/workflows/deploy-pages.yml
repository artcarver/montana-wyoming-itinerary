name: Deploy site to GitHub Pages

# Auto-retries the Pages deploy to ride out GitHub's intermittent
# "Deployment failed, try again later" errors.
#
# This stays a harmless no-op until the repo's Pages source is switched to
# "GitHub Actions" (Settings > Pages > Build and deployment > Source).
# Until then the classic "deploy from a branch" flow keeps publishing the
# site, so merging this file changes nothing on its own.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Detect Pages build type
        id: cfg
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bt=$(gh api "repos/${{ github.repository }}/pages" --jq '.build_type' 2>/dev/null || echo none)
          echo "Pages build_type: $bt"
          echo "bt=$bt" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.cfg.outputs.bt == 'workflow'
        uses: actions/checkout@v4

      - name: Configure Pages
        if: steps.cfg.outputs.bt == 'workflow'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.cfg.outputs.bt == 'workflow'
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy (attempt 1)
        id: d1
        if: steps.cfg.outputs.bt == 'workflow'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retry
        if: steps.cfg.outputs.bt == 'workflow' && steps.d1.outcome == 'failure'
        run: sleep 20

      - name: Deploy (attempt 2)
        id: d2
        if: steps.cfg.outputs.bt == 'workflow' && steps.d1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before final retry
        if: steps.cfg.outputs.bt == 'workflow' && steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        run: sleep 30

      - name: Deploy (attempt 3)
        if: steps.cfg.outputs.bt == 'workflow' && steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        uses: actions/deploy-pages@v4
